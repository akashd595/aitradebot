spring.application.name=aitradebot

# Server Port
server.port=8080

# MySQL Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/tradebot_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Config for Auto Table Creation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.file.name=stock_logs/trading_api.log
logging.level.root=INFO
logging.level.com.aitrade.aitradebot=DEBUG